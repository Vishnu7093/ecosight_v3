<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSight</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f1f7ea">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="light-mode">

    <nav class="navbar">
        <div class="brand">EcoSight</div>
        <div class="nav-icons">
            <!-- Theme Toggle -->
            <button class="icon-btn" id="theme-toggle" title="Toggle Theme">
                <!-- Sun Icon -->
                <svg id="sun-icon" class="icon-svg" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <!-- Moon Icon -->
                <svg id="moon-icon" class="icon-svg" style="display:none" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </nav>

    <div class="auth-container">
        <!-- LOGIN FORM -->
        <div id="login-form" class="auth-card">
            <h2>Welcome Back</h2>
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <input type="text" id="login-username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%">Log In</button>
            </form>
            <p class="toggle-text">
                New here? <span onclick="toggleAuth()">Create Account</span>
            </p>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signup-form" class="auth-card" style="display: none;">
            <h2>Create Account</h2>
            <form onsubmit="handleSignup(event)">
                <div class="input-group">
                    <input type="text" id="signup-username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="email" id="signup-email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="signup-password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%">Sign Up</button>
            </form>
            <p class="toggle-text">
                Already have an account? <span onclick="toggleAuth()">Log In</span>
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Theme toggle for login page
        const themeToggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');

        function setTheme(isLight) {
            if (isLight) {
                document.body.classList.add('light-mode');
                if (sunIcon && moonIcon) { sunIcon.style.display = 'none'; moonIcon.style.display = 'block'; }
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.remove('light-mode');
                if (sunIcon && moonIcon) { sunIcon.style.display = 'block'; moonIcon.style.display = 'none'; }
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme');
        setTheme(savedTheme !== 'dark');

        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', () => {
                setTheme(!document.body.classList.contains('light-mode'));
            });
        }
    </script>
</body>

</html>
